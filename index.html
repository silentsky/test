<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>uBO Scriptlet Test Page</title>
    <style>
        body { font-family: sans-serif; line-height: 1.6; padding: 20px; }
        #status { padding: 10px; border-radius: 5px; font-weight: bold; }
        .running { background-color: #ffcccc; color: #990000; }
        .blocked { background-color: #ccffcc; color: #006600; }
    </style>
</head>
<body>

    <h1>uBO Scriptlet Lab</h1>
    <p>Target property: <code>window.badBotActive</code></p>
    
    <div id="status" class="running">
        Script Status: RUNNING (Property not aborted)
    </div>

<script>
    // 1. Define the property
    window.badBotActive = true;

    // 2. Wrap the "bad" action in a function or a slight delay
    // This gives uBO a better chance to hook the 'get' action
    function checkStatus() {
        if (window.badBotActive) {
            console.log("If you see this, acis FAILED.");
            document.getElementById('status').innerText = "Script Status: RUNNING (Failed to Abort)";
            document.getElementById('status').className = "running";
        }
    }

    checkStatus();
</script>

</body>
</html>
